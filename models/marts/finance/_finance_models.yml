version: 2

models:
  - name: mart_daily_sales
    description: "Daily sales performance by channel: orders, units, revenue, and margin."
    columns:
      - name: order_date
        data_tests:
          - not_null
      - name: gross_revenue
        description: "Completed-order gross revenue for the day and channel, in dollars."

  - name: mart_customer_ltv
    description: "Customer lifetime value mart at the customer grain, based on completed-order revenue and margin."
    columns:
      - name: customer_id
        description: "Primary key for a customer with at least one completed order."
        data_tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: total_orders
        description: "Count of completed orders for the customer."
        data_tests:
          - not_null
      - name: lifetime_revenue
        description: "Lifetime gross revenue from completed orders, in dollars."
      - name: lifetime_margin
        description: "Lifetime gross margin from completed orders, in dollars."
      - name: avg_order_value
        description: "Average gross revenue per completed order, in dollars."
      - name: first_order_date
        description: "Date of the customer's first completed order."
      - name: last_order_date
        description: "Date of the customer's most recent completed order."
      - name: tenure_days
        description: "Days since the customer's first completed order."
      - name: recency_days
        description: "Days since the customer's most recent completed order."
      - name: predicted_annual_value
        description: "Annualized revenue estimate based on lifetime revenue and customer tenure."
      - name: ltv_segment
        description: "Revenue-based customer segment using legacy LTV thresholds."
        data_tests:
          - accepted_values:
              arguments:
                values: ["bronze", "silver", "gold", "platinum"]
      - name: lifecycle_stage
        description: "Recency-based lifecycle bucket using legacy thresholds."
        data_tests:
          - accepted_values:
              arguments:
                values: ["active", "lapsing", "churned"]
