version: 2

models:
  - name: dim_customers
    description: "Customer dimension enriched with lifetime order metrics and a lifecycle status."
    columns:
      - name: customer_id
        description: "Primary key for a customer."
        data_tests:
          - unique
          - not_null
      - name: home_store_id
        description: "Home store assigned to the customer."
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_stores')
                field: store_id
      - name: customer_status
        description: "Lifecycle bucket derived from most recent order date."
        data_tests:
          - accepted_values:
              arguments:
                values: ["active", "lapsing", "churned", "never_ordered"]
      - name: lifetime_gross
        description: "Total gross revenue from completed orders, in dollars."

  - name: dim_products
    description: "Product dimension with category, margin, and lifetime sales metrics."
    columns:
      - name: product_id
        data_tests:
          - unique
          - not_null
      - name: category_id
        description: "Product category key."
        data_tests:
          - not_null
      - name: department
        description: "Top-level merchandising department."
        data_tests:
          - not_null

  - name: dim_stores
    description: "Store dimension with lifetime order counts and gross revenue."
    columns:
      - name: store_id
        data_tests:
          - unique
          - not_null
      - name: region
        description: "Store sales region."
        data_tests:
          - not_null

  - name: dim_dates
    description: "Date spine covering the demo window with common calendar attributes."
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_day
        granularity: day
        data_tests:
          - unique
          - not_null
      - name: year
        data_tests:
          - not_null

  - name: fct_orders
    description: "One row per order with line-item economics and payment outcomes."
    semantic_model:
      enabled: true
    agg_time_dimension: order_date
    metrics:
      - name: total_revenue
        description: "Total gross revenue from orders."
        label: Total Revenue
        type: simple
        agg: sum
        expr: gross_amount
      - name: total_margin
        description: "Total gross margin from orders."
        label: Total Margin
        type: simple
        agg: sum
        expr: total_margin
      - name: order_count
        description: "Count of orders."
        label: Order Count
        type: simple
        agg: count
        expr: 1
      - name: average_order_value
        description: "Average gross revenue per order."
        label: Average Order Value
        type: simple
        agg: average
        expr: gross_amount
      - name: refunded_order_count
        description: "Count of orders with at least one refund."
        label: Refunded Order Count
        type: simple
        agg: sum_boolean
        expr: has_refund
      - name: completed_order_count
        description: "Count of completed orders."
        label: Completed Order Count
        type: simple
        agg: sum_boolean
        expr: is_completed
      - name: refund_rate
        description: "Share of orders that had a refund."
        label: Refund Rate
        type: ratio
        numerator: refunded_order_count
        denominator: order_count
      - name: fulfillment_rate
        description: "Share of orders in completed status."
        label: Fulfillment Rate
        type: ratio
        numerator: completed_order_count
        denominator: order_count
    columns:
      - name: order_id
        entity:
          type: primary
          name: order
        data_tests:
          - unique
          - not_null
      - name: customer_id
        entity:
          type: foreign
          name: customer
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: store_id
        entity:
          type: foreign
          name: store
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_stores')
                field: store_id
      - name: order_date
        granularity: day
        dimension:
          type: time
        data_tests:
          - not_null
      - name: order_channel
        dimension:
          type: categorical
        data_tests:
          - accepted_values:
              arguments:
                values: ["web", "store", "mobile_app"]
              config:
                severity: warn
      - name: region
        dimension:
          type: categorical
        data_tests:
          - not_null
      - name: order_status
        dimension:
          type: categorical
        data_tests:
          - not_null
      - name: is_completed
        dimension:
          type: categorical
        data_tests:
          - not_null
      - name: has_refund
        dimension:
          type: categorical
        data_tests:
          - not_null
      - name: gross_amount
        description: "Sum of gross line amounts on the order, in dollars."
      - name: total_margin
        description: "Gross margin on the order, in dollars."

  - name: fct_order_items

    description: "One row per order line item with product, cost, and margin."
    columns:
      - name: order_item_id
        data_tests:
          - unique
          - not_null
      - name: order_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_orders')
                field: order_id
      - name: product_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id

  - name: fct_payments
    description: "One row per payment with order and customer keys."
    columns:
      - name: payment_id
        data_tests:
          - unique
          - not_null
      - name: order_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_orders')
                field: order_id
      - name: customer_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: payment_status
        data_tests:
          - accepted_values:
              arguments:
                values: ["captured", "refunded"]

saved_queries:
  - name: core_order_metrics_daily
    description: "Daily core order metrics for finance and operations reporting."
    label: Core Order Metrics Daily
    query_params:
      metrics:
        - total_revenue
        - total_margin
        - order_count
        - average_order_value
      group_by:
        - TimeDimension('metric_time', 'day')
    exports:
      - name: core_order_metrics_daily_export
        config:
          export_as: table
          schema: marts
          alias: core_order_metrics_daily

  - name: weekly_channel_region_performance
    description: "Weekly performance by sales channel and region."
    label: Weekly Channel Region Performance
    query_params:
      metrics:
        - total_revenue
        - total_margin
        - order_count
        - average_order_value
      group_by:
        - TimeDimension('metric_time', 'week')
        - Dimension('order__order_channel')
        - Dimension('order__region')
    exports:
      - name: weekly_channel_region_performance_export
        config:
          export_as: table
          schema: marts
          alias: weekly_channel_region_performance

  - name: refund_and_fulfillment_monitoring
    description: "Daily monitoring view of refunds and fulfillment outcomes by channel and order status."
    label: Refund And Fulfillment Monitoring
    query_params:
      metrics:
        - order_count
        - refunded_order_count
        - completed_order_count
        - refund_rate
        - fulfillment_rate
      group_by:
        - TimeDimension('metric_time', 'day')
        - Dimension('order__order_channel')
        - Dimension('order__order_status')
        - Dimension('order__has_refund')
    exports:
      - name: refund_and_fulfillment_monitoring_export
        config:
          export_as: table
          schema: marts
          alias: refund_and_fulfillment_monitoring
