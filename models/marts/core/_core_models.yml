version: 2

models:
  - name: dim_customers
    description: "Customer dimension enriched with lifetime order metrics and a lifecycle status."
    columns:
      - name: customer_id
        description: "Primary key for a customer."
        data_tests:
          - unique
          - not_null
      - name: home_store_id
        description: "Home store assigned to the customer."
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_stores')
                field: store_id
      - name: customer_status
        description: "Lifecycle bucket derived from most recent order date."
        data_tests:
          - accepted_values:
              arguments:
                values: ["active", "lapsing", "churned", "never_ordered"]
      - name: lifetime_gross
        description: "Total gross revenue from completed orders, in dollars."

  - name: dim_products
    description: "Product dimension with category, margin, and lifetime sales metrics."
    columns:
      - name: product_id
        data_tests:
          - unique
          - not_null
      - name: category_id
        description: "Product category key."
        data_tests:
          - not_null
      - name: department
        description: "Top-level merchandising department."
        data_tests:
          - not_null

  - name: dim_stores
    description: "Store dimension with lifetime order counts and gross revenue."
    columns:
      - name: store_id
        data_tests:
          - unique
          - not_null
      - name: region
        description: "Store sales region."
        data_tests:
          - not_null

  - name: dim_dates
    description: "Date spine covering the demo window with common calendar attributes."
    time_spine:
      standard_granularity_column: date_day
    columns:
      - name: date_day
        granularity: day
        data_tests:
          - unique
          - not_null
      - name: year
        data_tests:
          - not_null

  - name: fct_orders
    description: "One row per order with line-item economics and payment outcomes."
    semantic_model:
      enabled: true
    agg_time_dimension: order_date
    metrics:
      - name: total_revenue
        description: "Total gross revenue from orders."
        label: Total Revenue
        type: simple
        agg: sum
        expr: gross_amount
      - name: order_count
        description: "Count of orders."
        label: Order Count
        type: simple
        agg: count
        expr: 1
      - name: average_order_value
        description: "Average gross revenue per order."
        label: Average Order Value
        type: simple
        agg: average
        expr: gross_amount
      - name: revenue
        description: "Gross revenue from completed orders only."
        label: Revenue
        type: simple
        agg: sum
        expr: gross_amount
        filter: |
          {{ Dimension('order__order_status') }} = 'completed'
      - name: completed_orders
        description: "Count of completed orders."
        label: Completed Orders
        type: simple
        agg: sum
        expr: case when is_completed then 1 else 0 end
      - name: aov
        description: "Average order value for completed orders only."
        label: AOV
        type: ratio
        numerator: revenue
        denominator: completed_orders
    columns:

      - name: order_id
        entity:
          type: primary
          name: order
        data_tests:
          - unique
          - not_null
      - name: customer_id
        entity:
          type: foreign
          name: customer
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: store_id
        entity:
          type: foreign
          name: store
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_stores')
                field: store_id
      - name: order_date
        granularity: day
        dimension:
          type: time
        data_tests:
          - not_null
      - name: order_channel
        dimension:
          type: categorical
        data_tests:
          - accepted_values:
              arguments:
                values: ["web", "store", "mobile_app"]
              config:
                severity: warn
      - name: region
        dimension:
          type: categorical
        data_tests:
          - not_null
      - name: order_status
        dimension:
          type: categorical
        data_tests:
          - not_null
      - name: gross_amount
        description: "Sum of gross line amounts on the order, in dollars."

  - name: fct_order_items

    description: "One row per order line item with product, cost, and margin."
    columns:
      - name: order_item_id
        data_tests:
          - unique
          - not_null
      - name: order_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_orders')
                field: order_id
      - name: product_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id
  - name: fct_payments
    description: "One row per payment with order and customer keys."
    semantic_model:
      enabled: true
    agg_time_dimension: payment_date
    metrics:
      - name: refund_amount
        description: "Amount refunded to customers."
        label: Refund Amount
        type: simple
        agg: sum
        expr: amount
        filter: |
          {{ Dimension('payment__payment_status') }} = 'refunded'
      - name: refund_count
        description: "Count of refunded payments."
        label: Refund Count
        type: simple
        agg: sum
        expr: case when is_refunded then 1 else 0 end
    columns:
      - name: payment_id
        entity:
          type: primary
          name: payment
        data_tests:
          - unique
          - not_null
      - name: order_id
        entity:
          type: foreign
          name: order
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('fct_orders')
                field: order_id
      - name: customer_id
        entity:
          type: foreign
          name: customer
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: payment_date
        granularity: day
        dimension:
          type: time
      - name: payment_method
        dimension:
          type: categorical
      - name: payment_status
        dimension:
          type: categorical
        data_tests:
          - accepted_values:
              arguments:
                values: ["captured", "refunded"]

saved_queries:

  - name: core_order_metrics
    description: "Saved query for core order metrics."
    label: Core Order Metrics
    query_params:
      metrics:
        - total_revenue
        - order_count
        - average_order_value
      group_by:
        - TimeDimension('metric_time', 'day')
    exports:
      - name: core_order_metrics_export
        config:
          export_as: table

  - name: commercial_performance_daily
    description: "Daily commercial performance with revenue, orders, completed orders, AOV, and refunds."
    label: Commercial Performance Daily
    query_params:
      metrics:
        - revenue
        - order_count
        - completed_orders
        - aov
        - refund_amount
      group_by:
        - TimeDimension('metric_time', 'day')

  - name: commercial_performance_by_channel
    description: "Commercial performance by day, channel, and region."
    label: Commercial Performance by Channel
    query_params:
      metrics:
        - revenue
        - order_count
        - completed_orders
        - aov
      group_by:
        - TimeDimension('metric_time', 'day')
        - Dimension('order__order_channel')
        - Dimension('order__region')

  - name: refunds_daily
    description: "Daily refunded amount and refunded payment count."
    label: Refunds Daily
    query_params:
      metrics:
        - refund_amount
        - refund_count
      group_by:
        - TimeDimension('metric_time', 'day')
        - Dimension('order__payment_method')
