version: 2

models:
  - name: dim_customers
    description: "Customer dimension enriched with lifetime order metrics and a lifecycle status."
    columns:
      - name: customer_id
        description: "Primary key for a customer."
        data_tests:
          - unique
          - not_null
      - name: customer_status
        description: "Lifecycle bucket derived from most recent order date."
        data_tests:
          - accepted_values:
              arguments:
                values: ["active", "lapsing", "churned", "never_ordered"]
      - name: lifetime_gross
        description: "Total gross revenue from completed orders, in dollars."

  - name: dim_products
    description: "Product dimension with category, margin, and lifetime sales metrics."
    columns:
      - name: product_id
        data_tests:
          - unique
          - not_null
      - name: department
        description: "Top-level merchandising department."

  - name: dim_stores
    description: "Store dimension with lifetime order counts and gross revenue."
    columns:
      - name: store_id
        data_tests:
          - unique
          - not_null

  - name: dim_dates
    description: "Date spine covering the demo window with common calendar attributes."
    columns:
      - name: date_day
        data_tests:
          - unique
          - not_null

  - name: fct_orders
    description: "One row per order with line-item economics and payment outcomes."
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: customer_id
      - name: store_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_stores')
                field: store_id
      - name: gross_amount
        description: "Sum of gross line amounts on the order, in dollars."

  - name: fct_order_items
    description: "One row per order line item with product, cost, and margin."
    columns:
      - name: order_item_id
        data_tests:
          - unique
          - not_null
      - name: product_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id

  - name: fct_payments
    description: "One row per payment with order and customer keys."
    columns:
      - name: payment_id
        data_tests:
          - unique
          - not_null
